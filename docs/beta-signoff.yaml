# Beta Deployment Signoff Record
#
# This file is updated after every successful run of scripts/check-beta-readiness.sh.
# It MUST be signed off by the project lead before beta testers are invited.
#
# Process:
#   1. Run: bash scripts/check-beta-readiness.sh   (no flags; all gates required)
#   2. If all gates pass, update this file with the run details below.
#   3. Request project lead sign-off (update signed_off_by + signed_off_date).
#   4. Deploy to beta testers only after signed_off_by is set.
#
# Gate checklist (must all be PASS before signoff). These are the EXACT 12
# gate executions performed by scripts/check-beta-readiness.sh, in order, and
# correspond 1:1 to the keys recorded in last_gate_run.gate_detail below
# (reconciled 2026-05-18, Equoria-w8se — the prior 10-item list omitted the
# doctrine-checks and frontend-mock-data gates and used stale names):
#   1.  Doctrine-checks suite (run-all.sh)            [GATE 1]
#   2.  Backend ESLint (no errors)                    [GATE 2]
#   3.  Frontend tsc --noEmit                         [GATE 3]
#   4.  Routes tests                                  [GATE 4]
#   5.  Integration tests                             [GATE 4]
#   6.  Module tests (backend/modules/*/__tests__)    [GATE 4b]
#   7.  Playwright beta-readiness suite               [GATE 5]
#   8.  No HTTP test/cleanup routes                   [GATE 6]
#   9.  No DB mocks in integration tests              [GATE 7]
#   10. No mock data in frontend production code      [GATE 7]
#   11. No bypass headers in E2E/api-client           [GATE 8]
#   12. No test.skip on beta-critical paths           [GATE 9]
# ============================================================================

