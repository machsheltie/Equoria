ci:
  collect:
    # Run against the static Vite build via vite preview (which handles
    # SPA fallback automatically — any unknown path serves index.html so
    # the client-side router can take over). The previous staticDistDir
    # config didn't fall back, so /login returned 404.
    #
    # Target /login — a public route that renders synchronously without
    # an auth round-trip. The default `/` route is wrapped in
    # <ProtectedRoute>, which depends on useSessionGuard → AuthContext →
    # React Query call to /api/auth/profile. In Lighthouse's no-backend
    # context that retries through React Query's default backoff, keeping
    # Chrome's first-paint pipeline from settling within the 30s LH
    # window. /login is a static page below all that.
    # Equoria-3iyk Phase 2b / Equoria-whx.
    startServerCommand: 'npm run preview --prefix frontend -- --port=4173 --strictPort'
    startServerReadyPattern: 'Local:'
    url:
      - 'http://localhost:4173/login'
    numberOfRuns: 1

  assert:
    # Removed `preset: lighthouse:no-pwa` — that preset enforces strict
    # individual-audit thresholds (target-size, total-byte-weight,
    # unused-css-rules, unused-javascript, valid-source-maps) that fail
    # on a rich SPA bundle. Stick to category-level scores; individual
    # audits are visible in the report but don't gate CI.
    assertions:
      # Warn on performance — game has rich UI, strict pass would be too aggressive
      categories:performance:
        - warn
        - minScore: 0.65
      # Error on accessibility — must meet minimum WCAG bar
      categories:accessibility:
        - error
        - minScore: 0.85
      # Warn on best practices
      categories:best-practices:
        - warn
        - minScore: 0.8
      # SEO not enforced for a game (logged-in app)
      categories:seo:
        - warn
        - minScore: 0.5

  upload:
    target: temporary-public-storage
