openapi: 3.0.3
info:
  title: 'Equoria API'
  description: 'Backend API for Equoria horse breeding and competition game'
  version: 1.0.0
  contact:
    name: 'Equoria Team'
  x-generated:
    timestamp: '2026-05-13T00:00:00.000Z'
    endpointCount: 100
    schemaCount: 2
    generator: manual
servers:
  - url: 'http://localhost:3000/api'
    description: 'Development server (legacy base path)'
  - url: 'http://localhost:3000/api/v1'
    description: 'Development server (v1 versioned path)'
  - url: 'https://equoria.up.railway.app/api/v1'
    description: 'Production server'
tags:
  - name: Auth
    description: 'Authentication endpoints'
  - name: Horses
    description: 'Horse management endpoints'
  - name: Breeds
    description: 'Horse breed definitions'
  - name: Breeding
    description: 'Breeding operations and foal management'
  - name: Training
    description: 'Training sessions and milestones'
  - name: Competition
    description: 'Competition endpoints'
  - name: Shows
    description: 'Player-created show management'
  - name: Grooms
    description: 'Groom hiring, assignments, and performance'
  - name: Riders
    description: 'Rider system'
  - name: Trainers
    description: 'Trainer system'
  - name: Leaderboards
    description: 'Rankings and leaderboards'
  - name: Users
    description: 'User profile and dashboard'
  - name: Community
    description: 'Forum, messages, and clubs'
  - name: Forum
    description: 'Community forum threads and posts'
  - name: Messages
    description: 'Direct messages between users'
  - name: Clubs
    description: 'Clubs, memberships, and elections'
  - name: Marketplace
    description: 'Horse marketplace — buy, sell, and list horses'
  - name: Services
    description: 'In-game services — bank, vet, tack shop, farrier, feed shop, inventory, crafting'
  - name: Traits
    description: 'Horse trait discovery and management'
  - name: Admin
    description: 'Administrative operations'
  - name: Labs
    description: 'Experimental endpoints (non-SLO, subject to change)'
  - name: Health
    description: 'Health check endpoints'
paths:
  # ── Health ──────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: 'Health check'
      description: 'Returns API health status'
      responses:
        '200':
          description: 'API is healthy'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }

  # ── Auth (public) ────────────────────────────────────────────────────────────
  /auth/csrf-token:
    get:
      tags: [Auth]
      summary: 'Get CSRF token'
      responses:
        '200': { description: 'CSRF token returned' }

  /auth/register:
    post:
      tags: [Auth]
      summary: 'Register a new user'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201': { description: 'User registered successfully' }
        '400': { description: 'Validation error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: 'Login user'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: 'Login successful'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { description: 'Invalid credentials' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: 'Request password reset'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: 'Reset email sent if account exists' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: 'Reset password with token'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: 'Password reset successful' }
        '400': { description: 'Invalid or expired token' }

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: 'Refresh access token'
      responses:
        '200': { description: 'New access token returned' }
        '401': { description: 'Invalid refresh token' }

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: 'Verify email address'
      parameters:
        - { name: token, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: 'Email verified' }
        '400': { description: 'Invalid or expired token' }

  # ── Auth (authenticated) ─────────────────────────────────────────────────────
  /auth/profile:
    get:
      tags: [Auth]
      summary: 'Get user profile'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'User profile returned' }
        '401': { description: Unauthorized }
    put:
      tags: [Auth]
      summary: 'Update user profile'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                email: { type: string, format: email }
      responses:
        '200': { description: 'Profile updated' }
        '401': { description: Unauthorized }

  /auth/me:
    get:
      tags: [Auth]
      summary: 'Get current user (alias for /auth/profile)'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'User profile returned' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: 'Logout user'
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: 'Logout successful' } }

  /auth/change-password:
    post:
      tags: [Auth]
      summary: 'Change password'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        '200': { description: 'Password changed' }
        '401': { description: Unauthorized }

  /auth/complete-onboarding:
    post:
      tags: [Auth]
      summary: 'Complete user onboarding'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'Onboarding completed' }

  /auth/advance-onboarding:
    post:
      tags: [Auth]
      summary: 'Advance to next onboarding step'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'Onboarding step advanced' }

  /auth/profile/preferences:
    patch:
      tags: [Auth]
      summary: 'Update user preferences'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: 'Preferences updated' }

  # ── Horses ───────────────────────────────────────────────────────────────────
  /horses:
    get:
      tags: [Horses]
      summary: 'Get all horses for authenticated user'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: 'List of horses'
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Horse' } }
    post:
      tags: [Horses]
      summary: 'Create a new horse'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, breed, age, sex]
              properties:
                name: { type: string }
                breed: { type: string }
                age: { type: integer }
                sex: { type: string, enum: [male, female] }
      responses:
        '201': { description: 'Horse created' }
        '400': { description: 'Validation error' }

  '/horses/{id}':
    get:
      tags: [Horses]
      summary: 'Get a horse by ID'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Horse data' }
        '404': { description: 'Horse not found' }
    put:
      tags: [Horses]
      summary: 'Update a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: 'Horse updated' }
    delete:
      tags: [Horses]
      summary: 'Delete a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Horse deleted' }
        '403': { description: 'Forbidden' }
        '404': { description: 'Horse not found' }

  /horses/temperament-definitions:
    get:
      tags: [Horses]
      summary: 'Get all temperament type definitions with game effects'
      description: 'Returns all 11 temperament types with descriptions, training modifiers, competition modifiers, and best groom personality matches. Requires authentication.'
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 'Temperament definitions retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                required: [success, message, data]
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string }
                  data:
                    type: object
                    required: [count, definitions]
                    properties:
                      count: { type: integer, example: 11 }
                      definitions:
                        type: array
                        items:
                          type: object
                          required:
                            [
                              name,
                              description,
                              prevalenceNote,
                              trainingModifiers,
                              competitionModifiers,
                              bestGroomPersonalities,
                            ]
                          properties:
                            name:
                              type: string
                              description: 'Canonical temperament name (e.g. "Bold", "Nervous", "Calm")'
                            description:
                              type: string
                              description: 'Human-readable behavioural summary'
                            prevalenceNote:
                              type: string
                              description: 'Prose note on how common this temperament is in the population'
                            trainingModifiers:
                              type: object
                              required: [xpModifier, scoreModifier]
                              properties:
                                xpModifier:
                                  type: number
                                  description: 'Multiplier applied to XP earned per training session (e.g. 1.10 = +10%)'
                                scoreModifier:
                                  type: number
                                  description: 'Multiplier applied to per-stat training gain'
                            competitionModifiers:
                              type: object
                              required: [riddenModifier, conformationModifier]
                              properties:
                                riddenModifier:
                                  type: number
                                  description: 'Multiplier on final score for ridden disciplines'
                                conformationModifier:
                                  type: number
                                  description: 'Multiplier on final score for conformation/halter classes'
                            bestGroomPersonalities:
                              type: array
                              description: 'Groom personalities that pair positively with this temperament (synergy > 0). Empty when no personality has a positive synergy.'
                              items: { type: string }
        '401': { description: Unauthorized }
        '500': { description: 'Internal server error' }

  '/horses/{id}/xp':
    get:
      tags: [Horses]
      summary: 'Get XP for a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Horse XP data' }
    post:
      tags: [Horses]
      summary: 'Award XP to a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: integer }
      responses:
        '200': { description: 'XP awarded' }

  '/horses/{id}/conformation':
    get:
      tags: [Horses]
      summary: 'Get conformation scores for a horse'
      description: 'Returns all 8 conformation region scores plus overall average. Requires ownership.'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200': { description: 'Conformation scores retrieved successfully' }
        '400': { description: 'Invalid horse ID' }
        '401': { description: Unauthorized }
        '403': { description: 'Forbidden — horse belongs to another user' }
        '404': { description: 'Horse not found' }
        '500': { description: 'Internal server error' }

  '/horses/{id}/conformation/analysis':
    get:
      tags: [Horses]
      summary: 'Get conformation analysis with breed percentile rankings'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200': { description: 'Conformation analysis retrieved successfully' }
        '400': { description: 'Invalid horse ID' }
        '401': { description: Unauthorized }
        '403': { description: 'Forbidden — horse belongs to another user' }
        '404': { description: 'Horse not found' }
        '500': { description: 'Internal server error' }

  '/horses/{id}/gaits':
    get:
      tags: [Horses]
      summary: 'Get gait quality scores for a horse'
      description: 'Returns walk, trot, canter, gallop scores (0–100). For gaited breeds, includes specialty gaits.'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: 'Gait scores retrieved successfully'
          content:
            application/json:
              schema:
                type: object
                required: [success, message, data]
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    nullable: true
                    description: 'Null for legacy horses without gait scores'
                    required: [horseId, horseName, breedId, gaitScores]
                    properties:
                      horseId: { type: integer }
                      horseName: { type: string }
                      breedId: { type: integer }
                      gaitScores:
                        type: object
                        required: [walk, trot, canter, gallop]
                        properties:
                          walk: { type: integer, minimum: 0, maximum: 100 }
                          trot: { type: integer, minimum: 0, maximum: 100 }
                          canter: { type: integer, minimum: 0, maximum: 100 }
                          gallop: { type: integer, minimum: 0, maximum: 100 }
                          gaiting:
                            type: array
                            nullable: true
                            description: 'Specialty gaits for gaited breeds (e.g. running walk, tölt); null/omitted for non-gaited breeds'
                            items:
                              type: object
                              required: [name, score]
                              properties:
                                name: { type: string }
                                score: { type: integer, minimum: 0, maximum: 100 }
        '400': { description: 'Invalid horse ID' }
        '401': { description: Unauthorized }
        '403': { description: 'Forbidden — horse belongs to another user' }
        '404': { description: 'Horse not found' }

  '/horses/breeding/color-prediction':
    post:
      tags: [Horses]
      summary: 'Calculate offspring coat-color probability distribution for a sire/dam pair'
      description: |
        Per-locus Punnett squares are combined via Cartesian product across all
        coat loci, lethal genotype combinations are filtered, and remaining
        probabilities are renormalized and aggregated by phenotype (color name).

        Ownership: both `sireId` and `damId` must be owned by the authenticated
        user — a 404 ("Horse not found") is returned when either horse is missing
        OR not owned (no information leak between the two cases).

        AC6 legacy-horse handling: when either parent lacks `colorGenotype`, the
        response is HTTP 200 with `data: null` and a message indicating that
        prediction requires both parents to have genetics data. Callers MUST
        handle the null-data case.

        Optional `foalBreedId` overrides the breed used to resolve the foal's
        breed genetic profile (defaults to dam's breed).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sireId, damId]
              properties:
                sireId:
                  type: integer
                  minimum: 1
                  description: 'ID of the sire horse (must be owned by requester)'
                damId:
                  type: integer
                  minimum: 1
                  description: 'ID of the dam horse (must be owned by requester)'
                foalBreedId:
                  type: integer
                  minimum: 1
                  description: "Optional — overrides foal breed profile lookup (defaults to dam's breed)"
      responses:
        '200':
          description: 'Color prediction results (or null for legacy horses lacking genotype)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    nullable: true
                    type: object
                    description: 'AC6: null when either parent lacks colorGenotype (legacy horse)'
                    properties:
                      sireId: { type: integer }
                      damId: { type: integer }
                      possibleColors:
                        type: array
                        items:
                          type: object
                          properties:
                            colorName: { type: string }
                            probability: { type: number, format: float, minimum: 0, maximum: 1 }
                            percentage: { type: string, example: '50.0%' }
                      totalCombinations: { type: integer, minimum: 0 }
                      lethalCombinationsFiltered: { type: integer, minimum: 0 }
        '400': { description: 'Validation failed (missing/invalid sireId or damId)' }
        '401': { description: 'Unauthorized — missing or invalid auth token' }
        '404':
          { description: 'Horse not found OR not owned by requester (no leak between the two)' }
        '500': { description: 'Internal server error while calculating prediction' }

  # ── Epic 31E-4: coat color genetics endpoints ───────────────────────────────
  '/horses/{id}/genetics':
    get:
      tags: [Horses]
      summary: 'Get full coat color genotype + phenotype for a horse (owner-only)'
      description: |
        Returns the horse's full color genotype (allele pairs per locus) and
        phenotype JSONB for breeding planning. Returns `data: null` when the
        horse pre-dates the color-genetics system (legacy horse). Requires
        the requester to own the target horse.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: 'Genetics data (or null for legacy horses)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    nullable: true
                    type: object
                    properties:
                      horseId: { type: integer }
                      horseName: { type: string }
                      colorGenotype:
                        type: object
                        description: 'Allele pairs keyed by locus name (e.g. E_Extension: "E/e")'
                        additionalProperties: { type: string }
                      phenotype:
                        nullable: true
                        type: object
                        description: 'Phenotype JSONB (colorName, shade, markings, modifiers)'
        '401': { description: 'Unauthorized' }
        '403': { description: 'Forbidden — horse not owned by requester' }
        '404': { description: 'Horse not found' }
        '500': { description: 'Internal server error' }

  '/horses/{id}/color':
    get:
      tags: [Horses]
      summary: 'Get player-facing coat color and markings summary for a horse'
      description: |
        Player-safe view of a horse's coat (no genotype): color name, shade,
        face / leg / advanced markings, and modifier flags. Returns
        `data: null` when the horse has no phenotype data (legacy horse).
        Requires the requester to own the target horse.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: 'Color data (or null for legacy horses)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    nullable: true
                    type: object
                    properties:
                      horseId: { type: integer }
                      horseName: { type: string }
                      colorName: { type: string, nullable: true }
                      shade: { type: string, nullable: true }
                      faceMarking: { type: string, nullable: true }
                      legMarkings:
                        nullable: true
                        type: object
                        description: 'Per-leg markings keyed by position (frontLeft, frontRight, hindLeft, hindRight)'
                      advancedMarkings:
                        nullable: true
                        type: object
                        description: 'Boolean flags for rare markings (e.g. bloodyShoulderPresent, snowflakePresent)'
                      modifiers:
                        nullable: true
                        type: object
                        description: 'Boolean modifier flags (isSooty, isFlaxen, isPangare, isRabicano)'
        '401': { description: 'Unauthorized' }
        '403': { description: 'Forbidden — horse not owned by requester' }
        '404': { description: 'Horse not found' }
        '500': { description: 'Internal server error' }

  # ── Breeds ───────────────────────────────────────────────────────────────────
  /breeds:
    get:
      tags: [Breeds]
      summary: 'Get all horse breeds'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'List of breeds' }
    post:
      tags: [Breeds]
      summary: 'Create a new breed'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201': { description: 'Breed created' }

  '/breeds/{id}':
    get:
      tags: [Breeds]
      summary: 'Get breed by ID'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Breed data' }
        '404': { description: 'Breed not found' }

  # ── Training ─────────────────────────────────────────────────────────────────
  /training/train:
    post:
      tags: [Training]
      summary: 'Train a horse in a discipline'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [horseId, discipline]
              properties:
                horseId: { type: integer }
                discipline: { type: string }
      responses:
        '200': { description: 'Training successful' }
        '400': { description: 'Validation error or horse not eligible' }
        '401': { description: Unauthorized }

  /training/check-eligibility:
    post:
      tags: [Training]
      summary: 'Check if a horse is eligible for training'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [horseId]
              properties:
                horseId: { type: integer }
      responses:
        '200': { description: 'Eligibility result' }

  '/training/trainable/{horseId}':
    get:
      tags: [Training]
      summary: 'Get trainable disciplines for a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: horseId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'List of trainable disciplines' }

  '/training/status/{horseId}':
    get:
      tags: [Training]
      summary: 'Get training status for a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: horseId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Training status' }

  /milestones/evaluate:
    post:
      tags: [Training]
      summary: 'Evaluate training milestones for a horse'
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [horseId]
              properties:
                horseId: { type: integer }
      responses:
        '200': { description: 'Milestone evaluation results' }

  '/milestones/{horseId}':
    get:
      tags: [Training]
      summary: 'Get milestones for a horse'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: horseId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: 'Milestone data' }

  /milestones/milestone-definitions:
    get:
      tags: [Training]
      summary: 'Get all milestone definitions'
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: 'Milestone definitions' }

  # ── Competition ───────────────────────────────────────────────────────────────
  /competition:
    get:
      tags: [Competition]
      summary: 'List competitions'
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: 'Paginated list of competitions' }

  /competition/enter-show:
    post:
      tags: [Competition]
