                          type: object,
                          properties:
                            {
                              success: { type: boolean, example: true },
                              message: { type: string },
                              data:
                                {
                                  type: object,
                                  nullable: true,
                                  properties:
                                    {
                                      horseId: { type: integer },
                                      horseName: { type: string },
                                      breedId: { type: integer },
                                      breedName: { type: string },
                                      totalHorsesInBreed: { type: integer },
                                      analysis:
                                        {
                                          type: object,
                                          description: 'Per-region score, breedMean, and percentile',
                                        },
                                      overallConformation:
                                        {
                                          type: object,
                                          properties:
                                            {
                                              score: { type: integer },
                                              breedMean: { type: integer },
                                              percentile:
                                                { type: integer, minimum: 0, maximum: 100 },
                                            },
                                        },
                                    },
