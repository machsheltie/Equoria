      tags: [Horses]
      summary: 'Get conformation scores for a horse'
      description: 'Returns all 8 conformation region scores (head, neck, shoulders, back, hindquarters, legs, hooves, topline) plus the overall average. Returns null data for legacy horses without conformation scores. Requires ownership of the horse.'
      security: [{ bearerAuth: [] }]
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: integer, minimum: 1 },
            description: 'Horse ID',
          },
        ]
      responses:
        {
          '200':
            {
              description: 'Conformation scores retrieved successfully',
              content:
                {
                  application/json:
                    {
                      schema:
                        {
                          type: object,
                          properties:
                            {
                              success: { type: boolean, example: true },
                              message: { type: string },
                              data:
                                {
                                  type: object,
                                  nullable: true,
                                  properties:
                                    {
                                      horseId: { type: integer },
                                      horseName: { type: string },
                                      breedId: { type: integer },
                                      conformationScores:
                                        {
                                          type: object,
                                          properties:
                                            {
                                              head:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              neck:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              shoulders:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              back:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              hindquarters:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              legs:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              hooves:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
                                                  nullable: true,
                                                },
                                              topline:
                                                {
                                                  type: integer,
                                                  minimum: 0,
                                                  maximum: 100,
