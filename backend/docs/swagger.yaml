  '/api/v1/horses/{id}/conformation/analysis':
    get:
      tags: [Horses]
      summary: 'Get conformation analysis with breed percentile rankings'
      description: 'Returns per-region percentile ranking compared to all same-breed horses in the database. Percentile = percentage of same-breed horses scoring lower. Breed mean comes from genetic profiles, not live database averages. Returns null data for legacy horses or horses without a breed assignment.'
      security: [{ bearerAuth: [] }]
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: integer, minimum: 1 },
            description: 'Horse ID',
          },
        ]
      responses:
        {
          '200':
            {
              description: 'Conformation analysis retrieved successfully',
              content:
