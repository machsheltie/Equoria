components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, username]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        username: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthResponse:
      type: object
      properties:
        token: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string, format: email }
        level: { type: integer }
        money: { type: integer }
    Horse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        breed: { type: string }
        age: { type: integer }
        sex: { type: string, enum: [male, female] }
        userId: { type: string }
        speed: { type: integer }
        stamina: { type: integer }
        agility: { type: integer }
        boldness: { type: integer }
        precision: { type: integer }
