# Railway deployment configuration for Equoria
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run database migrations before starting the server on every deploy.
# prisma migrate deploy is idempotent — safe to run even with no new migrations.
startCommand = "sh -c 'cd /app/packages/database && npx prisma migrate deploy && cd /app/backend && node server.mjs'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
