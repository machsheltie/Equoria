<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equoria - Fantasy Horse Simulation</title>
    <meta
      name="description"
      content="Immerse yourself in the magical world of Equoria — breed, train, and compete with legendary horses."
    />
    <meta name="author" content="Equoria" />

    <!-- Self-hosted fonts (ADR-6: no Google Fonts CDN — GDPR risk for EU/UK users) -->
    <!-- Cinzel Decorative: EQUORIA wordmark / hero display only -->
    <!-- Cinzel: all headings, card titles, nav items, buttons -->
    <!-- Inter: all body text, form labels, descriptions, data values -->
    <!-- Preload the highest-priority latin subsets used on every page -->
    <link
      rel="preload"
      href="/fonts/inter-v20-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/cinzel-v26-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/cinzel-decorative-v19-400-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/cinzel-decorative-v19-700-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Auth scene background — preload for fast initial paint on login/register -->
    <link rel="preload" href="/images/backgrounds/auth/bg-16.9.webp" as="image" type="image/webp" />

    <meta property="og:title" content="Equoria - Fantasy Horse Simulation" />
    <meta
      property="og:description"
      content="Breed, train, and compete with legendary horses in the world of Equoria."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
