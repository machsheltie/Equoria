<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#0f2346"/>
  <!-- Horse silhouette -->
  <g fill="rgba(148,163,184,0.3)">
    <!-- Body -->
    <ellipse cx="200" cy="180" rx="90" ry="55"/>
    <!-- Neck -->
    <ellipse cx="155" cy="130" rx="28" ry="40" transform="rotate(-20 155 130)"/>
    <!-- Head -->
    <ellipse cx="118" cy="100" rx="22" ry="16" transform="rotate(-30 118 100)"/>
    <!-- Muzzle -->
    <ellipse cx="100" cy="108" rx="14" ry="10" transform="rotate(-30 100 108)"/>
    <!-- Ear -->
    <polygon points="128,82 134,68 140,82"/>
    <!-- Legs -->
    <rect x="148" y="228" width="14" height="48" rx="6"/>
    <rect x="172" y="228" width="14" height="48" rx="6"/>
    <rect x="218" y="228" width="14" height="44" rx="6"/>
    <rect x="242" y="228" width="14" height="44" rx="6"/>
    <!-- Tail -->
    <path d="M288,160 Q320,140 315,190 Q310,220 295,240" stroke="rgba(148,163,184,0.3)" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Subtle text -->
  <text x="200" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(148,163,184,0.4)">No image available</text>
</svg>
