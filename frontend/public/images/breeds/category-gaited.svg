<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Category placeholder: GAITED (upright carriage, high head, flowing tail) -->
  <rect width="400" height="300" fill="#0f2346"/>
  <g fill="rgba(148,163,184,0.3)">
    <!-- Body -->
    <ellipse cx="205" cy="172" rx="90" ry="52"/>
    <!-- Neck (very upright) -->
    <ellipse cx="158" cy="106" rx="24" ry="50" transform="rotate(-8 158 106)"/>
    <!-- Head (high-set) -->
    <ellipse cx="150" cy="62" rx="20" ry="15" transform="rotate(-12 150 62)"/>
    <!-- Muzzle -->
    <ellipse cx="138" cy="74" rx="12" ry="9" transform="rotate(-12 138 74)"/>
    <!-- Ear -->
    <polygon points="158,44 162,30 168,44"/>
    <!-- Legs (animated, lifted front) -->
    <rect x="150" y="220" width="13" height="56" rx="6"/>
    <rect x="176" y="214" width="13" height="50" rx="6"/>
    <rect x="222" y="222" width="13" height="54" rx="6"/>
    <rect x="248" y="222" width="13" height="54" rx="6"/>
    <!-- Tail (long, flowing) -->
    <path d="M294,154 Q330,140 328,202 Q326,244 306,266" stroke="rgba(148,163,184,0.3)" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>
  <text x="200" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(148,163,184,0.4)">Gaited breed — no portrait available</text>
</svg>
