<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Category placeholder: SPORT / WARMBLOOD (tall, athletic, long lines) -->
  <rect width="400" height="300" fill="#0f2346"/>
  <g fill="rgba(148,163,184,0.3)">
    <!-- Body (long, lean) -->
    <ellipse cx="205" cy="165" rx="96" ry="50"/>
    <!-- Neck (long, elegant) -->
    <ellipse cx="150" cy="112" rx="26" ry="48" transform="rotate(-24 150 112)"/>
    <!-- Head (refined) -->
    <ellipse cx="116" cy="78" rx="21" ry="15" transform="rotate(-32 116 78)"/>
    <!-- Muzzle -->
    <ellipse cx="98" cy="86" rx="13" ry="9" transform="rotate(-32 98 86)"/>
    <!-- Ear -->
    <polygon points="126,60 131,46 138,60"/>
    <!-- Legs (long, slender) -->
    <rect x="146" y="212" width="13" height="62" rx="6"/>
    <rect x="172" y="212" width="13" height="62" rx="6"/>
    <rect x="222" y="212" width="13" height="58" rx="6"/>
    <rect x="248" y="212" width="13" height="58" rx="6"/>
    <!-- Tail -->
    <path d="M298,148 Q332,128 326,188 Q322,222 304,244" stroke="rgba(148,163,184,0.3)" stroke-width="12" stroke-linecap="round" fill="none"/>
  </g>
  <text x="200" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(148,163,184,0.4)">Sport horse — no portrait available</text>
</svg>
