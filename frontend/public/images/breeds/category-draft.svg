<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Category placeholder: DRAFT (stocky, heavy build, feathered legs) -->
  <rect width="400" height="300" fill="#0f2346"/>
  <g fill="rgba(148,163,184,0.3)">
    <!-- Body (broad, deep) -->
    <ellipse cx="205" cy="170" rx="105" ry="68"/>
    <!-- Neck (thick, arched) -->
    <ellipse cx="150" cy="120" rx="36" ry="46" transform="rotate(-15 150 120)"/>
    <!-- Head (large) -->
    <ellipse cx="112" cy="92" rx="26" ry="20" transform="rotate(-28 112 92)"/>
    <!-- Muzzle -->
    <ellipse cx="92" cy="100" rx="16" ry="12" transform="rotate(-28 92 100)"/>
    <!-- Ear -->
    <polygon points="122,72 128,58 135,72"/>
    <!-- Legs (thick, with feathering) -->
    <rect x="140" y="230" width="20" height="52" rx="8"/>
    <rect x="172" y="230" width="20" height="52" rx="8"/>
    <rect x="222" y="230" width="20" height="48" rx="8"/>
    <rect x="254" y="230" width="20" height="48" rx="8"/>
    <!-- Tail (full) -->
    <path d="M308,150 Q346,132 340,190 Q336,228 318,252" stroke="rgba(148,163,184,0.3)" stroke-width="16" stroke-linecap="round" fill="none"/>
  </g>
  <text x="200" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(148,163,184,0.4)">Draft breed — no portrait available</text>
</svg>
