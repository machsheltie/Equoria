# Equoria Quality Gate Pipeline
# Generated by BMad TEA Agent — CI Workflow (2026-04-10)
# Stack: fullstack | Backend: Jest (Node ESM) | Frontend: Vitest | E2E: Playwright
#
# Fixes applied vs ci-cd.yml:
#   CI-01: seed:test step replaced — seedDatabase.mjs did not exist
#   CI-02: Node pinned to 22.x (matches current LTS; was 18.x)
#   CI-03: Coverage threshold gate added (70% branch/line minimum)
#   CI-04: Redis optional — ioredis mock covers all Jest tests
#   CI-05: Performance tests moved to non-blocking parallel job
#   CI-06: Integration tests no longer double-run with full suite
#
# Security: All ${{ inputs.* }} and unsafe ${{ github.event.* }} contexts
# are routed through env: intermediaries. See EXTENSION PATTERNS below.

name: 'Equoria Quality Gate'

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # Weekly burn-in (flaky detection) — Sundays 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  # Equoria-sv0b: include `github.sha` so each commit's run is independent.
  # Without this, every push to master (or PR head) cancels the in-flight
  # run from the previous commit, killing the long-running e2e-tests job
  # mid-execution. With per-SHA groups: different commits → different groups
  # → no cross-commit cancellation. Same SHA re-pushed (rare: rebase + force-
  # push, webhook duplication, manual workflow_dispatch on same commit) →
  # same group → cancel-in-progress wins, avoiding double-runs.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.x'
  DATABASE_URL: 'postgresql://test:test@localhost:5432/equoria_test'
  # validate-environment.mjs requires length>=32 + uppercase + lowercase + digit.
  JWT_SECRET: 'Test-JWT-Secret-For-CI-Minimum-32-Chars-Long-A1'
  JWT_REFRESH_SECRET: 'Test-Refresh-Secret-For-CI-Minimum-32-Chars-B2'
  NODE_ENV: 'test'
  # config/config.mjs requires PORT for the test profile (validator throws on
  # missing — Equoria-fefh2 recovery: this was the single root cause of all
  # 498 shard-2 suite-load failures + Performance/Load/Security job failures
  # on 2026-06-10 once lint stopped masking them). Local runs read .env.test.
  PORT: '3000'
  # MFA secret at-rest encryption (Equoria-yi13v) — mfa* suites 500 without a
  # key. Fixed 64-hex TEST key, no production meaning (Equoria-fefh2.36).
  FIELD_ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
  # Redis is disabled in test mode — no real Redis needed for tests
  # (cacheHelper.initializeRedis returns null when NODE_ENV=test;
  # rateLimiting: redisIntentionallyDisabled). The in-memory fallback is the tested path.
  REDIS_URL: 'redis://localhost:6379'

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint (backend + frontend, no DB required)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 'Lint & Format'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        # The root /eslint.config.js (flat config) imports @eslint/js and
        # typescript-eslint from root node_modules. ESLint walks up from
        # frontend/ when it runs and resolves these from root. Without this
        # install step, frontend ESLint fails with ERR_MODULE_NOT_FOUND for
        # @eslint/js.
        run: npm ci --no-audit --no-fund

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: ESLint — backend
        working-directory: ./backend
        run: npm run lint

      - name: ESLint — frontend
        working-directory: ./frontend
        # eslint is now in frontend/package.json devDependencies and resolves
        # via the lockfile (see commit 4ffa8316). Step is now hard-required.
        run: npm run lint

      - name: Prettier check — backend
        working-directory: ./backend
        run: npm run format:check

      - name: Prettier check — frontend
        working-directory: ./frontend
        # Frontend now has prettier in devDependencies and a format:check
        # script (see commit adding prettier dep). Hard-required.
        run: npm run format:check

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Database Preflight (migration validation)
  # ──────────────────────────────────────────────────────────────────────────────
  db-preflight:
    name: 'Database Migration Check'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/database/package-lock.json

      - name: Install database dependencies
        working-directory: ./packages/database
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./packages/database
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Run migrations
        working-directory: ./packages/database
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Validate schema
        working-directory: ./packages/database
        run: npx prisma validate --schema=prisma/schema.prisma

      - name: Verify migration integrity
        working-directory: ./packages/database
        run: node migrations/verify_migration.js

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Backend Tests, Sharded (3 shards × parallel)
  #
  # Tests are self-contained — each suite creates and cleans its own DB fixtures.
  # No seed step needed. Seeding for dev data is separate from test data.
  # Shard 1: tests/  (unit + service tests)
  # Shard 2: tests/integration/ + modules/**/__tests__/
  # Shard 3: __tests__/ (legacy location)
  # ──────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 'Backend Tests (Shard ${{ matrix.shard }})'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, db-preflight]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        include:
          # Shard 1 — everything under tests/ except integration, plus
          # test files under models/, seed/, and the top-level backend/scripts/
          # + backend/eslint-plugins/ dirs. The old pattern anchored on $
          # so `tests/services/foo.test.mjs` never matched (only bare
          # `tests/foo.test.mjs` did), leaving 44 test files orphaned — this
          # was why dozens of services showed 0% coverage despite having
          # passing tests. The backend/(scripts|eslint-plugins)/ alternative is
          # anchored on `backend/` so it catches ONLY the top-level
          # scripts/eslint-plugins *.test.mjs (Equoria-axvnd: 4 files that
          # matched NO shard and never ran in CI) WITHOUT also grabbing the
          # backend/__tests__/scripts/ sentinels that shard 3 already owns.
          # Mutual exclusivity AND exhaustiveness are enforced by
          # ciShardExclusivity.sentinel.test.mjs + check-ci-shard-exclusivity.mjs.
          - shard: 1
            pattern: 'tests/(?!integration/)|(models|seed)/[^/]+\.test\.mjs$|backend/(scripts|eslint-plugins)/[^/]+\.test\.mjs$'
          # Shard 2 — integration tests + module co-located tests
          - shard: 2
            pattern: 'tests/integration|modules/.*/__tests__'
          # Shard 3 — legacy/top-level __tests__ dirs (largest volume),
          # EXCLUDING the module co-located modules/<x>/__tests__ suites that
          # shard 2 owns. The old bare '__tests__/' substring also matched every
          # modules/*/__tests__ path, so 469 module suites ran in BOTH shard 2
          # and shard 3 (Equoria-2ixd1): wasted CI minutes, coverage double-
          # counting in the merge gate, and — worst — two parallel matrix jobs
          # mutating the SAME suite's fixtures against the SHARED real DB (the
          # cross-job FK/isolation flake class run-suite-sharded.mjs avoids
          # serially). The negative lookahead drops anything under a
          # modules/.../__tests__/ path; `.*` (not `[^/]+`) also covers nested
          # module dirs (modules/<x>/<sub>/__tests__). Verified via jest
          # --listTests: 0 files match >1 shard after this change (was 469),
          # and 0 NEW orphans. Guarded by ciShardExclusivity.sentinel.test.mjs.
          - shard: 3
            pattern: '^(?!.*modules/.*/__tests__/).*__tests__/'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            packages/database/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install database dependencies
        working-directory: ./packages/database
        run: npm ci

      - name: Generate Prisma client + run migrations
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      # Equoria-fefh2.36: the real-DB doctrine made suites canonical-data-
      # coupled (e.g. breedCountSentinel asserts all 312 data/breeds rows with
      # shade_bias). A freshly migrated DB has zero breeds; seed the base data
      # then the full breed roster (both idempotent).
      - name: Seed canonical test data (base + 312-breed roster)
        working-directory: ./backend
        run: |
          npm run seed
          npm run seed:breeds

      - name: Run backend tests — shard ${{ matrix.shard }}
        working-directory: ./backend
        env:
          SHARD_PATTERN: ${{ matrix.pattern }}
        run: |
          set -o pipefail
          # Security: SHARD_PATTERN passed through env: to prevent script injection
          # coverage reporters:
          #   - lcov: Codecov upload
          #   - json-summary: human-readable per-shard totals
          #   - json: coverage-final.json, required by `nyc merge` in Coverage Gate
          #
          # Heap management (Equoria-ac23): the CI invocation runs Jest directly
          # via `node ... jest.js`, which bypasses the `--max-old-space-size=8192`
          # flag set in backend/package.json's `test` script. Without it Node
          # defaults to ~4GB old-space — and shard 2 (395 suites with coverage
          # instrumentation) was hitting OOM/SIGTERM at heap ~3.8GB, surfacing
          # as worker-failed-to-exit-gracefully on whichever suites happened to
          # be last in the queue (breedController, memoryAdminGuard). Two
          # cooperating mitigations:
          #   1. --max-old-space-size=8192 — raise V8 old-space to 8GB, matching
          #      the local `npm test` invocation (ubuntu-latest runners have
          #      ≥16GB RAM, so this is well within budget).
          #   2. --workerIdleMemoryLimit=1500MB — Jest 29 auto-recycles a worker
          #      after a test file completes if its RSS exceeds the limit. This
          #      prevents cumulative bloat from leaking module caches, coverage
          #      counters, and Prisma client instances across hundreds of
          #      suites in a single worker.
          mkdir -p test-results
          npm run test:backend:ci -- \
            --testPathPattern="$SHARD_PATTERN" \
            --coverage \
            --coverageReporters=lcov \
            --coverageReporters=json-summary \
            --coverageReporters=json 2>&1 | tee test-results/jest.log

      - name: Summarize backend failure — shard ${{ matrix.shard }}
        if: failure()
        working-directory: ./backend
        run: node scripts/summarize-jest-results.mjs test-results/jest-results.json test-results/jest-summary.txt

      - name: Upload coverage — shard ${{ matrix.shard }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: ./backend/coverage/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results-shard-${{ matrix.shard }}
          path: ./backend/test-results/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Coverage Gate (CI-03: enforce threshold)
  #
  # Merges coverage from all 3 shards and enforces 70% branch + line minimum.
  # Fail fast here rather than discovering gaps post-deploy.
  # ──────────────────────────────────────────────────────────────────────────────
  coverage-gate:
    name: 'Coverage Gate'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Download coverage — shard 1
        uses: actions/download-artifact@v8
        with:
          name: coverage-shard-1
          path: ./coverage-shard-1

      - name: Download coverage — shard 2
        uses: actions/download-artifact@v8
        with:
          name: coverage-shard-2
          path: ./coverage-shard-2

      - name: Download coverage — shard 3
        uses: actions/download-artifact@v8
        with:
          name: coverage-shard-3
          path: ./coverage-shard-3

      - name: Merge shard coverage and enforce threshold
        working-directory: ./backend
        run: |
          # Collect each shard's coverage-final.json into .nyc_output, then
          # merge with nyc and let nyc report enforce the thresholds declared
          # in backend/.nycrc.json (check-coverage: true → 85% lines/statements,
          # 80% branches/functions). Single source of truth for thresholds.
          mkdir -p .nyc_output merged-coverage
          for shard in 1 2 3; do
            SRC="../coverage-shard-${shard}/coverage-final.json"
            if [ -f "$SRC" ]; then
              cp "$SRC" ".nyc_output/coverage-shard-${shard}.json"
              echo "✓ Collected shard $shard coverage"
            else
              echo "⚠️ Missing $SRC"
              exit 1
            fi
          done
          npx nyc merge .nyc_output .nyc_output/merged.json
          # --reporter=text gives a readable per-file table in CI logs,
          # json-summary writes the structured summary Codecov consumes.
          npx nyc report \
            --reporter=text \
            --reporter=text-summary \
            --reporter=json-summary \
            --temp-dir=.nyc_output \
            --report-dir=./merged-coverage

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend/merged-coverage
          flags: backend
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 5 — Frontend Tests
  # ──────────────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: 'Frontend Tests (Vitest)'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install root dependencies
        # Equoria-fefh2.28 (DoD-10b): the Vitest max-lines doctrine sentinels
        # (apiClientMaxLinesDoctrine, pagesMaxLinesDoctrine) spawn ESLint with
        # cwd=REPO_ROOT (spawnSync ... { cwd: REPO_ROOT }), which loads the
        # root flat eslint.config.js. That config imports @eslint/js and
        # typescript-eslint from root node_modules. Without this step the
        # spawned ESLint crashes with ERR_MODULE_NOT_FOUND for @eslint/js and
        # the sentinels error out instead of asserting. Mirrors the lint job's
        # root-dep install (above).
        run: npm ci --no-audit --no-fund

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Chromium (required by storybook vitest project)
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Vitest with coverage
        working-directory: ./frontend
        # Equoria-zzlh (2026-05-04): removed continue-on-error: true. The
        # original "97/231 failing" comment was stale — actual baseline was
        # 8 failing files from two distinct bugs:
        #   - activity-utils.ts and statistics-utils.ts had `_`-prefixed
        #     enum members (unused-var lint sweep applied incorrectly to
        #     enum declarations, breaking the enum API for both consumers
        #     and tests)
        #   - ScoreBreakdownChart.test.tsx mock factory variables had `_`
        #     prefix on `const` declarations while assignment sites kept
        #     the unprefixed names
        # Plus 3 mock-setup bugs (App.story-8-1, OnboardingPage,
        # EmptyState) where vi.mock factories omitted exports the source
        # had since added (Footprints, Tooltip, advanceOnboarding hoist).
        # vitest.config.ts testTimeout bumped 10s → 20s for jsdom 4-fork
        # contention headroom. Suite now 243/243 green.
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: ./frontend/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 6 — E2E Tests (Playwright, master + PRs only)
  #
  # Note: R-03 from TD — breeding.spec.ts has try/catch flow control that swallows
  # assertion failures. This job will show green even for that spec until R-03 is fixed.
  # ──────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: 'E2E Tests (Playwright)'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Equoria-obwp: provision Redis for the E2E backend (NODE_ENV=beta in
      # playwright.config.ts → real rate-limit middleware path). Without a
      # Redis service the limiter falls back to in-memory mode and the
      # in-process counter accumulates across all 130 sequential Playwright
      # tests in one chromium worker, eventually tripping the 500/15min
      # registration cap and 429-ing the remainder of the run. With Redis
      # available the limiter uses RedisStore and counters reset cleanly per
      # window — beta-critical-path, breeding, onboarding-flow, session-
      # lifetime, and settings-persistence specs no longer share rate-limit
      # state through a leaky in-memory bucket. Bypass headers are explicitly
      # disabled under NODE_ENV=beta (see backend/middleware/rateLimiting.mjs
      # Story 21S-2), so Redis is the only correct fix — raising the cap via
      # TEST_RATE_LIMIT_MAX_REQUESTS would not apply (those env knobs only
      # take effect under NODE_ENV=test or JEST_WORKER_ID).
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install all dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../packages/database && npm ci

      - name: Setup database
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed minimum test data (breeds)
        # tests/e2e/global-setup.ts opens /onboarding and selects index 1 of
        # the breed-select dropdown. A freshly migrated DB has zero breeds,
        # so the select renders only the placeholder and the locator times
        # out. seedDatabase.mjs idempotently inserts the 5 canonical breeds
        # the UI needs to render a real choice. Equoria-3iyk Phase 1b.
        working-directory: ./backend
        run: npm run seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run Playwright E2E tests
        env:
          BASE_URL: 'http://localhost:3000'
        # `playwright install` above only fetches chromium binaries — firefox
        # and webkit projects in playwright.config.ts would fail with
        # 'browser not installed' instantly (3-4ms) under the default invocation.
        # Restrict the run to the chromium project to match what's actually
        # installed. Cross-browser coverage is a separate concern; if it's
        # added back, install the other browsers above.
        run: npx playwright test --project=chromium

      # Equoria-yhg0g (UX spec 13.4): automated accessibility gate.
      # Separate Playwright project (`a11y`) so it is a distinct, named
      # step — the main E2E lane result above stays independently
      # readable. This step is a REAL blocking gate (no continue-on-error,
      # per .claude/rules/EDGE_CASE_FIX_DISCIPLINE.md §2): it fails the job
      # if any covered beta surface has a critical/serious axe violation.
      # `if: always()` so it still runs even if a non-a11y E2E spec above
      # flaked, keeping the a11y signal independent of the main lane.
      - name: Run Accessibility (axe) E2E gate
        if: always()
        env:
          BASE_URL: 'http://localhost:3000'
        run: npx playwright test --project=a11y

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 7 — Performance Tests
  #
  # Was non-blocking ("Performance Tests (non-blocking)") while
  # seedPerformanceData.mjs accumulated schema drift that crashed the seed
  # step. Chunk-B code-review fix (2026-04-30) modernized the seed against
  # the current schema (Show.runDate, CompetitionResult.placement String,
  # Horse top-level stats, etc.) — the seed now runs cleanly and a real perf
  # regression should block merge, which is the correct contract for a job
  # named "Performance Tests."
  # ──────────────────────────────────────────────────────────────────────────────
  performance-tests:
    name: 'Performance Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            packages/database/package-lock.json

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../packages/database && npm ci

      - name: Setup database
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed performance data
        working-directory: ./backend
        # The perf seed picks a random breed via prisma.breed.findMany();
        # it just needs ANY breed to exist. `npm run seed` inserts 5
        # canonical breeds in ~5s, vs `npm run seed:breeds` which loads
        # 310 SQL files via $executeRawUnsafe and was taking 15+ min on CI
        # — long enough to blow the 20-min job timeout. Random selection
        # over 5 breeds is functionally identical to selection over 310
        # for performance testing purposes (we don't exercise breed-
        # specific code paths in the perf tests).
        run: |
          npm run seed
          npm run seed:performance

      - name: Run performance tests
        working-directory: ./backend
        run: npm run test:performance

      - name: Upload performance results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: performance-results
          path: ./backend/performance-results/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 7b — Load Contention (advisory, Equoria-fx5cb / k8t5 follow-up)
  #
  # Two real load probes for the concurrent feed+breed+foal contention class
  # (Equoria-zvp4 / k8t5):
  #
  #   1. bulk-foaling-cron driver — imports and invokes the REAL
  #      runFoalingJob() (the exact entrypoint the nightly cron
  #      runFoalingJobScheduled uses) CONCURRENTLY against scoped throwaway
  #      in-foal mares. Asserts the no-double-create invariant. This is the
  #      bulk cron path the k6 foal-now scenario does NOT exercise.
  #   2. k6 SMOKE contention harness — drives parallel feed + foal-now bursts
  #      at one shared in-foal mare against a backgrounded server, asserting
  #      the atomic-triple conservation invariants via k6 thresholds.
  #
  # ADVISORY by job topology: NO other job lists this in `needs`, and
  # `deployment-gate` does not depend on it — a red result here does NOT
  # block merge/deploy. But it is NOT `continue-on-error`: a live race makes
  # the harness exit non-zero and the JOB goes red so the signal is visible
  # (per .claude/rules/EDGE_CASE_FIX_DISCIPLINE.md §2 — advisory means the
  # job doesn't gate, not that failures are hidden). Both steps emit JSON
  # artifacts.
  #
  # Equoria-j2i9o (fx5cb follow-up) hardened the backgrounded-server sub-step
  # for the k6 harness against CI-runner pitfalls: explicit PORT (required by
  # server.mjs env validation), readiness poll on /ready (real DB ping, not
  # the /health liveness probe), explicit fail-with-server-log if the server
  # never boots, and a graceful-then-SIGKILL teardown. See the
  # 'Start backend (background) for k6 harness' step comment for detail.
  # ──────────────────────────────────────────────────────────────────────────────
  load-contention:
    name: 'Load Contention (advisory)'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            packages/database/package-lock.json

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../packages/database && npm ci

      - name: Setup database
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed canonical breeds
        # The bulk-cron driver selects a breed whose name is a
        # breedProfiles.json key (createFoalFromPregnancy requires a
        # profile). seedDatabase.mjs idempotently inserts the canonical
        # breeds, several of which have profiles.
        working-directory: ./backend
        run: |
          npm run seed
          npm run seed:breeds

      - name: Run bulk-foaling-cron contention driver (real cron path)
        # Drives the REAL runFoalingJob() concurrently — not a no-op:
        # asserts no mare double-foals across parallel sweeps. Exits
        # non-zero (=> red job) if the cron double-create race is live.
        # Uses the job-level env (DATABASE_URL etc.) — no --env-file needed
        # since the workflow `env:` block already exports them.
        working-directory: ./backend
        run: node tests/load/run-bulk-foaling-cron.mjs

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend (background) for k6 harness
        working-directory: ./backend
        # Hardened against the classic backgrounded-server-in-CI failure
        # modes (Equoria-j2i9o, fx5cb follow-up):
        #
        #   1. PORT must be set explicitly. server.mjs runs
        #      validateEnvironment() at startup, and PORT is a REQUIRED env
        #      var in REQUIRED_ENV_VARS (utils/validateEnvironment.mjs) — it
        #      reads process.env.PORT directly (not the `|| 3000` runtime
        #      default). The workflow-level `env:` block does NOT export PORT,
        #      so without this the server would fail-fast on boot and k6 would
        #      run against a dead port. Set deterministically to 3000 (matches
        #      API_URL below and the k6 default).
        #   2. Readiness gate polls /ready (real `SELECT 1` DB ping), NOT
        #      /health. /health is the lightweight liveness probe in app.mjs —
        #      it returns 200 as soon as the process binds, BEFORE the DB is
        #      proven reachable. The k6 harness self-provisions a user and
        #      drives DB-backed mutations in setup(), so it must not start
        #      until the DB round-trips. /ready returns 503 until the DB
        #      answers, then 200 — exactly the precondition k6 needs.
        #   3. Explicit fail-with-diagnostics if the server never becomes
        #      ready, instead of silently falling through into k6 against a
        #      dead/half-up server (which produces a confusing k6 failure that
        #      masks the real "server didn't boot" cause). The server log is
        #      dumped so the boot error (env validation, DB connect, port in
        #      use) is visible directly in this step's output. The step exits
        #      non-zero — advisory job goes red, signal is visible (no
        #      continue-on-error per .claude/rules/EDGE_CASE_FIX_DISCIPLINE.md §2).
        env:
          PORT: '3000'
        run: |
          set -uo pipefail
          npm start > /tmp/k6-server.log 2>&1 &
          echo $! > /tmp/k6-server.pid
          ready=0
          # ~60s budget (30 × 2s). Server cold-boot + first Prisma connect on
          # ubuntu-latest is comfortably under this; the postgres service is
          # already health-gated by the job `services:` block before steps run.
          for i in $(seq 1 30); do
            # If the backgrounded process has already exited, stop waiting —
            # boot failed (e.g. env validation) and no amount of polling fixes it.
            if ! kill -0 "$(cat /tmp/k6-server.pid)" 2>/dev/null; then
              echo "::error::Backend process exited during startup (PID gone). Server log:"
              cat /tmp/k6-server.log || true
              exit 1
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ready || echo 000)
            if [ "$code" = "200" ]; then
              echo "Backend ready (GET /ready -> 200) after ~$((i * 2))s"
              ready=1
              break
            fi
            echo "waiting for backend readiness... attempt $i/30 (GET /ready -> $code)"
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "::error::Backend never became ready (GET /ready != 200 within ~60s). Server log:"
            cat /tmp/k6-server.log || true
            exit 1
          fi

      - name: Run k6 concurrent feed+breed+foal SMOKE harness
        # SMOKE profile (~30s, low concurrency). k6 thresholds exit
        # non-zero on a torn atomic-triple / double-foal — surfaces the
        # race, makes the JOB red (advisory: no gate depends on this job).
        run: |
          k6 run -e SMOKE=1 -e API_URL=http://localhost:3000 \
            --summary-export=/tmp/k6-feed-breed-foal-summary.json \
            backend/tests/load/concurrent-feed-breed-foal.test.js

      - name: Stop backend
        if: always()
        # SIGTERM triggers the graceful shutdown handler in server.mjs (closes
        # the HTTP server, cron, Redis, Prisma; force-exits after 10s). `|| true`
        # so a missing/already-dead PID never reds the teardown step. Best-effort
        # SIGKILL fallback in case graceful shutdown stalls, so the runner does
        # not leak a backgrounded node process or hang on job completion.
        run: |
          if [ -f /tmp/k6-server.pid ]; then
            PID="$(cat /tmp/k6-server.pid)"
            kill "$PID" 2>/dev/null || true
            for i in $(seq 1 6); do
              if ! kill -0 "$PID" 2>/dev/null; then break; fi
              sleep 1
            done
            kill -9 "$PID" 2>/dev/null || true
          fi

      - name: Upload load-contention artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: load-contention-results
          path: |
            ./backend/load-results/
            /tmp/k6-feed-breed-foal-summary.json
            /tmp/k6-server.log
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 8 — Security Gate (blocking)
  #
  # P0 hardening policy:
  # - Dependency audit is blocking at high severity
  # - Backend security suite is blocking
  # - Environment validation is blocking
  # ──────────────────────────────────────────────────────────────────────────────
  security-gate:
    name: 'Security Gate'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, db-preflight]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            packages/database/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install database dependencies
        working-directory: ./packages/database
        run: npm ci

      - name: Generate Prisma client + run migrations
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      # Equoria-fefh2.36: same canonical-data parity as backend-tests.
      - name: Seed canonical test data (base + 312-breed roster)
        working-directory: ./backend
        run: |
          npm run seed
          npm run seed:breeds

      - name: Validate environment policy
        working-directory: ./backend
        run: npm run validate-env

      - name: Run backend security suite
        working-directory: ./backend
        run: npm run test:security

      - name: Audit-allowlist sentinel — prove expiry check fires (Equoria-e7l2)
        # Mirror of the ci-cd.yml sentinel. Plants an expired allowlist
        # entry, asserts the audit script exits 3. Catches expiry-check
        # regression before the real audit runs.
        run: |
          set -uo pipefail
          SENTINEL_ALLOWLIST=$(mktemp --suffix=.json)
          cat > "$SENTINEL_ALLOWLIST" <<'EOF'
          {"allowlist":[{"id":"GHSA-doctrine-sentinel","justification":"sentinel: intentionally past expiry to prove the gate fires","expires":"2020-01-01"}]}
          EOF
          set +e
          node scripts/audit-with-allowlist.mjs ./backend high "$SENTINEL_ALLOWLIST" > /dev/null 2>&1
          actual_exit=$?
          set -e
          rm -f "$SENTINEL_ALLOWLIST"
          if [ "$actual_exit" != "3" ]; then
            echo "SENTINEL FAIL: expected exit 3 from expired allowlist; got $actual_exit."
            exit 1
          fi
          echo "Sentinel OK: expiry check fires."

      - name: npm audit — backend (blocking with allowlist)
        # Equoria-e7l2 (21R-CI-3): replaced raw `npm audit --audit-level=
        # moderate` with expiry-tracked-allowlist wrapper. See
        # scripts/audit-with-allowlist.mjs for gate logic.
        run: node scripts/audit-with-allowlist.mjs ./backend high

      - name: npm audit — frontend (blocking with allowlist)
        run: node scripts/audit-with-allowlist.mjs ./frontend high

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 9 — Docker Build Validation (master only)
  # ──────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: 'Docker Build Validation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [coverage-gate, frontend-tests]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (multi-stage)
        run: docker build -t equoria:${{ github.sha }} .

      - name: Smoke-test container startup
        run: |
          docker run -d --name smoke-test \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -e JWT_SECRET=test-secret-minimum-32-characters-long \
            -e PORT=3000 \
            -p 3000:3000 \
            equoria:${{ github.sha }}
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || echo "000")
          echo "Health check HTTP status: $STATUS"
          docker stop smoke-test
          docker rm smoke-test
          if [ "$STATUS" = "000" ]; then
            echo "❌ Container never started — Docker build broken"
            exit 1
          fi
          echo "✅ Container started (status $STATUS)"

      - name: Verify frontend assets embedded
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -e JWT_SECRET=test-secret-minimum-32-characters-long \
            equoria:${{ github.sha }} \
            sh -c "for file in \
              /app/backend/public/index.html \
              /app/backend/public/images/bg-stable.webp \
              /app/backend/public/images/bg-horse-detail.webp \
              /app/backend/public/assets/art/farrier.webp \
              /app/backend/public/images/farriershop.webp; do \
                test -f \"\$file\" || { echo \"Missing frontend asset: \$file\"; exit 1; }; \
              done; \
              echo 'Frontend shell and required image assets embedded'"

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 9.5 — Beta Readiness Gate (master only)
  #
  # CI-runnable production-parity readiness lane:
  # - static scans (cleanup routes, DB mocks, frontend mocks, bypass headers)
  # - full Playwright readiness suite against live backend + frontend + Postgres
  # This replaces the old "local-only signoff" assumption with reproducible CI
  # evidence for beta readiness.
  # ──────────────────────────────────────────────────────────────────────────────
  beta-readiness-gate:
    name: 'Beta Readiness Gate'
    runs-on: ubuntu-latest
    # Equoria-k5e0 (21R-CI-6): raised from 35 to 55 minutes. The old cap was
    # tight on cold-cache runs: npm ci × 4 (~8-12 min cold), Playwright
    # install cold (~3-5 min), Playwright suite (~5-10 min) totals ~26-30 min
    # which leaves only ~5 min of headroom at 35. Playwright browsers are
    # already cached via the 'Cache Playwright browsers' step; a warm-cache
    # run completes in ~18-22 min (<40% of the new cap).
    timeout-minutes: 55
    needs: [coverage-gate, security-gate, frontend-tests]

    # Equoria-rrpw (21R-CI-4): override the workflow-level `NODE_ENV: test`
    # for the readiness lane. Mirrors the same fix in ci-cd.yml; see that
    # workflow for full rationale. Job-level `env` overrides workflow-
    # level per GitHub Actions precedence.
    env:
      NODE_ENV: 'beta-readiness'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Assert NODE_ENV is beta-readiness (Equoria-rrpw / 21R-CI-4)
        # Sentinel for the job-level env override above. Mirrors ci-cd.yml.
        # Catches regressions that would silently restore the workflow-
        # level `NODE_ENV: test` value, putting readiness evidence under
        # the wrong profile.
        run: |
          echo "NODE_ENV=$NODE_ENV"
          if [ "$NODE_ENV" != "beta-readiness" ]; then
            echo "FAIL: expected NODE_ENV=beta-readiness in this job; got '$NODE_ENV'."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            packages/database/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install all dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../packages/database && npm ci

      - name: Setup database
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed breeds (required for onboarding flow)
        # The beta-readiness Playwright suite includes
        # tests/e2e/readiness/auth-onboarding.spec.ts which selects a breed
        # from the BreedSelector dropdown via selectOption({ index: 1 }).
        # The dropdown is populated from GET /api/breeds, which returns
        # whatever's in the breeds table — empty in a fresh CI test DB.
        # Without breed seeding the test times out waiting for option 1.
        #
        # Use `npm run seed` (5 canonical breeds, ~5s) NOT seed:breeds
        # (310 SQL files via $executeRawUnsafe, 15+ min — blows the
        # 35-min job timeout per the comment in ci-cd.yml line 323).
        # Five breeds are enough to populate the dropdown.
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/equoria_test
        run: npm run seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Beta-readiness static scans (shared library)
        # Equoria-iffbt / ADR-010: the four cheap static scans are defined ONCE
        # in scripts/lib/beta-readiness-scans.sh and sourced by BOTH this CI job
        # and the canonical signoff script scripts/check-beta-readiness.sh.
        # There is no longer an inline copy of the scan regexes here, so the
        # script and CI cannot drift. Each sentinel function plants a known
        # violation, asserts the matching scan FIRES (OPTIMAL_FIX_DISCIPLINE §2),
        # then cleans up. The production scans run after the sentinels.
        run: |
          set -uo pipefail
          source scripts/lib/beta-readiness-scans.sh

          # Sentinel-positive self-tests first: prove the scans still gate.
          equoria_scan_sentinel_frontend_mock_data || { echo "Frontend mock-data sentinel FAILED"; exit 1; }
          equoria_scan_sentinel_bypass_headers || { echo "Bypass-header sentinel FAILED"; exit 1; }
          echo "Sentinels OK: mock-data and bypass-header scans catch planted violations and clean up."

          # Production scans (any non-zero return blocks the gate).
          equoria_scan_http_cleanup_routes || exit 1
          equoria_scan_integration_db_mocks || exit 1
          equoria_scan_frontend_mock_data || exit 1
          equoria_scan_bypass_headers || exit 1
          echo "All four beta-readiness static scans passed."

      - name: Run beta-readiness Playwright suite
        run: npm run test:e2e:beta-readiness

      - name: Upload beta-readiness artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: beta-readiness-artifacts
          path: |
            playwright-report/beta-readiness/
            test-results/beta-readiness/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 10 — Deployment Gate (master only)
  # Blocks on: coverage-gate, security-gate, beta-readiness-gate, e2e-tests, docker-build
  # Does NOT block on: performance-tests
  # ──────────────────────────────────────────────────────────────────────────────
  deployment-gate:
    name: 'Deployment Gate'
    runs-on: ubuntu-latest
    needs: [coverage-gate, security-gate, beta-readiness-gate, e2e-tests, docker-build]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: All gates passed
        run: |
          echo "## 🚀 Equoria Deployment Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Doctrine Gate | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Migration | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests (3 shards) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage ≥ 70% | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Gate | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Beta Readiness Gate | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Advisory (non-blocking): Performance tests_" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready for Railway deployment"

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 11 — Burn-In (weekly flaky detection, schedule-triggered only)
  #
  # Targets E2E specs. Runs 5 iterations to catch timing-dependent failures.
  # R-03 note: breeding.spec.ts try/catch swallows failures — burn-in will not
  # detect those until R-03 is fixed (Epic 21 story 21-4).
  # ──────────────────────────────────────────────────────────────────────────────
  burn-in:
    name: 'Burn-In (Flaky Detection)'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            packages/database/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install all dependencies
        run: |
          npm ci
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../packages/database && npm ci

      - name: Setup database
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed minimum test data (breeds)
        # tests/e2e/global-setup.ts opens /onboarding and selects index 1 of
        # the breed-select dropdown. A freshly migrated DB has zero breeds,
        # so the select renders only the placeholder and the locator times
        # out. seedDatabase.mjs idempotently inserts the 5 canonical breeds
        # the UI needs to render a real choice. Equoria-3iyk Phase 1b.
        working-directory: ./backend
        run: npm run seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Burn-in E2E — 5 iterations
        run: |
          echo "🔥 Starting E2E burn-in — flaky test detection"
          FAILURES=0
          for i in {1..5}; do
            echo "━━━ Iteration $i/5 ━━━"
            if ! npx playwright test --reporter=line; then
              FAILURES=$((FAILURES + 1))
              echo "⚠️ Iteration $i failed"
            fi
          done
          echo "Burn-in complete — $FAILURES/5 iterations failed"
          if [ "$FAILURES" -gt 1 ]; then
            echo "❌ Flaky threshold exceeded (>1 failure in 5 runs)"
            exit 1
          fi
          echo "✅ Burn-in passed"

      - name: Burn-in — Jest integration suite (parallel isolation check)
        working-directory: ./backend
        run: |
          echo "🔥 Backend parallel isolation burn-in — 3 iterations"
          FAILURES=0
          for i in {1..3}; do
            echo "━━━ Iteration $i/3 ━━━"
            if ! node --experimental-vm-modules node_modules/jest/bin/jest.js \
                tests/integration/ --forceExit --no-coverage; then
              FAILURES=$((FAILURES + 1))
              echo "⚠️ Iteration $i failed"
            fi
          done
          echo "Backend burn-in — $FAILURES/3 iterations failed"
          if [ "$FAILURES" -gt 0 ]; then
            echo "❌ Backend integration tests have parallel isolation issues"
            exit 1
          fi

      - name: Upload burn-in failures
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: burn-in-failures-${{ github.run_id }}
          path: |
            playwright-report/
            backend/test-results/
          retention-days: 30
