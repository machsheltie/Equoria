name: 'Equoria CI/CD Pipeline'

# Equoria-wj8m (2026-05-15): de-duplicated against .github/workflows/test.yml.
# Removed code-quality / database-setup / backend-tests / integration-tests /
# performance-tests / frontend-tests — those are now run exclusively by
# test.yml ('Equoria Quality Gate'), which is the canonical source of truth
# (BMad-generated, sharded backend, coverage gate, Redis-backed e2e, etc.).
# This workflow now contains only the jobs that are unique to ci-cd.yml:
#   - build-validation (smoke test for frontend Vite build + backend ESM)
#   - lighthouse (master-only Lighthouse audit, gated by build-validation)
#   - session-lifetime-nightly (cron-only auth regression for 21R-AUTH-6)
# Equoria-1mpp (earlier 2026-05-15) already removed security-gate /
# beta-readiness-gate / build-docker / deployment-gate — those are also in
# test.yml as the canonical version.
# Equoria-tic2 (2026-05-15): the line-377 frontend-tests `continue-on-error: true`
# bypass is GONE WITH THIS REFACTOR — the entire frontend-tests job was a
# duplicate of test.yml's frontend-tests job (which has no bypass, see commit
# Equoria-zzlh 2026-05-04). The bypass cannot be reintroduced because the job
# no longer exists in this workflow.

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # 2am UTC daily — session-lifetime-nightly job

env:
  NODE_VERSION: '22.x'
  DATABASE_URL: 'postgresql://test:test@localhost:5432/equoria_test'
  # validate-environment.mjs requires length>=32 + uppercase + lowercase + digit.
  # The error message says "weak (length: 44, min: 32)" but the actual reason
  # is the strength composition check, not the length. Synthetic A1 + B2
  # tokens satisfy uppercase+digit without making the secret meaningful.
  JWT_SECRET: 'Test-JWT-Secret-For-CI-Minimum-32-Chars-Long-A1'
  JWT_REFRESH_SECRET: 'Test-Refresh-Secret-For-CI-Minimum-32-Chars-B2'
  NODE_ENV: 'test'

jobs:
  # Build Validation: ensures frontend Vite + backend ESM build cleanly.
  # Runs independently of test.yml — if test.yml's backend-tests / frontend-
  # tests are red, build-validation can still surface a TypeScript / Vite
  # compilation regression separately. No cross-workflow `needs:` is possible
  # in GitHub Actions, so this job runs unconditionally and the lighthouse
  # job below cascades from it.
  build-validation:
    name: 'Build Validation'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 'Install Backend Dependencies'
        working-directory: ./backend
        run: npm ci

      - name: 'Install Frontend Dependencies'
        working-directory: ./frontend
        run: npm ci

      - name: 'Build Backend'
        working-directory: ./backend
        run: npm run build

      - name: 'Build Frontend'
        working-directory: ./frontend
        run: npm run build

      - name: 'Upload Build Artifacts'
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            ./backend/dist/
            ./frontend/build/
          retention-days: 7

  # Lighthouse Performance Audit (master only)
  lighthouse:
    name: 'Lighthouse Performance Audit'
    runs-on: ubuntu-latest
    needs: [build-validation]
    if: github.ref == 'refs/heads/master'

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 'Install Frontend Dependencies'
        working-directory: ./frontend
        run: npm ci

      - name: 'Build Frontend'
        working-directory: ./frontend
        run: npm run build

      - name: 'Run Lighthouse CI'
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.yml
          uploadArtifacts: true
          temporaryPublicStorage: true

  # Nightly: session-lifetime regression (21R-AUTH-6)
  # Runs only on the schedule trigger (not on push/PR) so it doesn't gate
  # normal merges. Exercises real credentials + real DB — no bypass headers.
  session-lifetime-nightly:
    name: 'Session Lifetime Nightly Regression (21R-AUTH-6)'
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: equoria_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6

      - name: 'Setup Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 'Install Backend Dependencies'
        working-directory: ./backend
        run: npm ci

      - name: 'Install Database Dependencies'
        working-directory: ./packages/database
        run: npm ci

      - name: 'Setup Database'
        working-directory: ./packages/database
        run: |
          npx prisma generate --schema=prisma/schema.prisma
          npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: 'Seed Test Database'
        working-directory: ./backend
        run: npm run seed:test

      - name: 'Run Session Lifetime Tests'
        working-directory: ./backend
        env:
          NODE_OPTIONS: '--max-old-space-size=4096 --experimental-vm-modules'
        run: >
          npx jest
          --testPathPattern="modules/health/__tests__/session-lifetime"
          --forceExit
          --runInBand

      - name: 'Upload Session Lifetime Test Results'
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: session-lifetime-nightly-results
          path: ./backend/test-results/
          retention-days: 30
