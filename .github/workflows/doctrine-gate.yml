name: Doctrine Gate

# Equoria-5nqe (B1): runs scripts/doctrine-checks/run-all.sh on every PR
# and on master pushes. The suite is the machine-checked enforcement of
# CLAUDE.md / 21R Beta Readiness Doctrine / EDGE_CASE_FIX_DISCIPLINE rules.
# Each script aggregates one rule; failure of any script fails the gate.
#
# Activation as a merge-blocker requires a branch-protection rule on master
# that requires this job. The job runs and reports today even before that
# toggle is set so contributors see the result on PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: doctrine-gate-${{ github.ref }}
  cancel-in-progress: true # doctrine-allow: workflow-cancel-shortrun (Equoria-sv0b: this gate is ~1 min, cancellation harmless)

jobs:
  doctrine-gate:
    name: Doctrine Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Equoria-fefh2.27: check-backend-lint-and-format.mjs runs the real
      # backend eslint + prettier, so the doctrine job needs backend deps.
      # Cached install ~30-60s; the alternative (skipping the check when deps
      # are missing) is the forbidden graceful-skip pattern.
      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: backend

      # Equoria-fefh2.27 widening (2026-06-12): the lint-and-format check now
      # mirrors the FRONTEND CI lint steps too, so frontend deps are needed —
      # the check hard-fails (correctly, no graceful skip) when they're absent.
      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: frontend

      - name: Run doctrine-checks suite
        run: bash scripts/doctrine-checks/run-all.sh
