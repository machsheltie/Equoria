name: OWASP ZAP Security Scan

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # Run weekly security scan every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (backend)
        working-directory: ./backend
        run: npm ci

      - name: Run npm audit (backend)
        id: npm-audit-backend
        working-directory: ./backend
        continue-on-error: true
        run: |
          echo "## Backend Dependency Scan" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-backend.json || true

          # Parse audit results
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-backend.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-backend.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-backend.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-backend.json)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Low | $LOW |" >> $GITHUB_STEP_SUMMARY

          # Fail if critical or high vulnerabilities found
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "⚠️ Critical or High severity vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Install dependencies (frontend)
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit (frontend)
        id: npm-audit-frontend
        working-directory: ./frontend
        continue-on-error: true
        run: |
          echo "## Frontend Dependency Scan" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-frontend.json || true

          # Parse audit results
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-frontend.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-frontend.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-frontend.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-frontend.json)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "moderate=$MODERATE" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 Low | $LOW |" >> $GITHUB_STEP_SUMMARY

          # Fail if critical or high vulnerabilities found
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "⚠️ Critical or High severity vulnerabilities detected!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-reports
          path: |
            backend/audit-backend.json
            frontend/audit-frontend.json
          retention-days: 90

      - name: Comment on PR (if vulnerabilities found)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const backendCritical = '${{ steps.npm-audit-backend.outputs.critical }}';
            const backendHigh = '${{ steps.npm-audit-backend.outputs.high }}';
            const frontendCritical = '${{ steps.npm-audit-frontend.outputs.critical }}';
            const frontendHigh = '${{ steps.npm-audit-frontend.outputs.high }}';

            let message = '## ⚠️ Security Vulnerabilities Detected\n\n';
            message += '| Package | Critical | High |\n';
            message += '|---------|----------|------|\n';
            message += `| Backend | ${backendCritical} | ${backendHigh} |\n`;
            message += `| Frontend | ${frontendCritical} | ${frontendHigh} |\n\n`;
            message += 'Please run `npm audit fix` to resolve these issues before merging.\n\n';
            message += '_Automated security scan by GitHub Actions_';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  zap-scan:
    name: OWASP ZAP API Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_test_pg_strong_pass_42
          POSTGRES_DB: equoria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install database dependencies
        # Needed for npx prisma migrate deploy below (schema lives here).
        working-directory: packages/database
        run: npm ci

      - name: Setup database schema
        # Prisma schema lives in packages/database, not backend. Run migrate
        # from that directory so prisma finds prisma/schema.prisma. Backend
        # was failing OWASP ZAP at the 'Setup database schema' step with
        # "Could not find Prisma Schema that is required for this command."
        working-directory: packages/database
        env:
          DATABASE_URL: postgresql://postgres:ci_test_pg_strong_pass_42@localhost:5432/equoria_test
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Generate Prisma Client
        working-directory: packages/database
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Create .env file
        working-directory: backend
        run: |
          # JWT_REFRESH_SECRET (not REFRESH_SECRET) is required by
          # backend/config/config.mjs:25 — the server refuses to start without it.
          # That missing var was the root cause of the ZAP job failing at 51s.
          cat > .env << EOF
          NODE_ENV=test
          PORT=3000
          DATABASE_URL=postgresql://postgres:ci_test_pg_strong_pass_42@localhost:5432/equoria_test
          JWT_SECRET=test_jwt_secret_key_minimum_32_characters_long
          JWT_REFRESH_SECRET=test_refresh_secret_key_minimum_32_characters
          REDIS_HOST=localhost
          REDIS_PORT=6379
          SESSION_SECRET=test_session_secret_minimum_32_characters_long
          COOKIE_SECRET=test_cookie_secret_minimum_32_characters_long
          CSRF_SECRET=test_csrf_secret_minimum_32_characters_long
          EMAIL_USER=test@example.com
          EMAIL_PASS=test_password
          FRONTEND_URL=http://localhost:5173
          ENABLE_RATE_LIMITING=true
          ENABLE_CSRF=true
          LOG_LEVEL=error
          EOF

      - name: Start API server
        working-directory: backend
        run: |
          npm start &
          echo $! > server.pid
          # Wait for server to be ready — 30s was too short for cold-start + migrations.
          npx wait-on http://localhost:3000/health -t 90000

      - name: Generate OpenAPI spec for ZAP
        working-directory: backend
        run: |
          # Export OpenAPI spec from running server
          curl -o openapi-spec.json http://localhost:3000/api-docs/swagger.json
          # Validate the spec exists
          if [ ! -f openapi-spec.json ]; then
            echo "Failed to download OpenAPI spec"
            exit 1
          fi

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        # Treat scan findings as advisory, not job-failing. The action's
        # default `fail_action: true` marked the whole job as failed when
        # any alert was found, even for the WARN-threshold rules we want to
        # collect but not gate on. Security issues still upload as SARIF
        # artifacts for triage; hard-block rules are tagged FAIL in the
        # rules file and the action will still exit non-zero for those.
        # allow_issue_writing=false — we manage a single tracking issue
        # via the "Update ZAP tracking issue" step below instead of letting
        # the action open a fresh issue per run.
        continue-on-error: true
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j -m 5 -T 30 -z "-config formhandler.fields.field.remove=password"'
          allow_issue_writing: false
          fail_action: false

      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.6.0
        # Advisory — same rationale as the baseline scan above. The API
        # scan was previously missing rules_file_name, so IGNORE/WARN
        # entries in .github/zap-rules.tsv were not applied and the scan
        # kept opening new issues for already-triaged alerts (100000,
        # 90005, 10049). Rules are now respected, and tracking is handled
        # by the "Update ZAP tracking issue" step below.
        continue-on-error: true
        with:
          target: 'http://localhost:3000'
          format: openapi
          api_file: 'backend/openapi-spec.json'
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-I -a -j -T 30 -z "-config formhandler.fields.field.remove=password"'
          allow_issue_writing: false
          fail_action: false

      - name: ZAP Full Scan (Weekly)
        if: github.event_name == 'schedule'
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.github/zap-rules.tsv'
          cmd_options: '-a -j -m 5 -T 120 -z "-config formhandler.fields.field.remove=password"'
          allow_issue_writing: false

      - name: Upload ZAP Baseline Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html

      - name: Upload ZAP API Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-report
          path: report_json.json

      - name: Process ZAP Results
        if: always()
        run: |
          # Count findings by severity
          if [ -f report_json.json ]; then
            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' report_json.json)
            MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' report_json.json)
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' report_json.json)

            echo "### ZAP Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY

            # Fail if high severity findings
            if [ "$HIGH" -gt 0 ]; then
              echo "❌ Found $HIGH high severity security issues!"
              exit 1
            fi
          fi

      - name: Update ZAP tracking issue
        # Posts a per-run comment to a single tracking issue instead of
        # letting the ZAP actions open a fresh issue each run. If no
        # tracking issue exists, creates one. Only runs on push/schedule
        # to master so PR runs don't spam the tracking thread.
        if: always() && (github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/master'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'report_json.json';
            if (!fs.existsSync(reportPath)) {
              core.info('No ZAP report produced; skipping tracking issue update.');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const alerts = (report.site && report.site[0] && report.site[0].alerts) || [];
            const byRisk = (code) => alerts.filter(a => a.riskcode === code);
            const high = byRisk('3');
            const medium = byRisk('2');
            const low = byRisk('1');
            const informational = byRisk('0');

            const trackingTitle = 'ZAP Security Tracking';
            const trackingLabel = 'zap-tracking';

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: trackingLabel,
              per_page: 10,
            });

            let issue = existing.find(i => i.title === trackingTitle);

            if (!issue) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: trackingTitle,
                labels: ['security', 'zap-scan', trackingLabel],
                body: [
                  '## ZAP Security Tracking',
                  '',
                  'Single tracking issue for automated OWASP ZAP scan results.',
                  'Each CI run posts a comment below with the latest findings.',
                  'Alerts already marked IGNORE/WARN in `.github/zap-rules.tsv`',
                  'are filtered before they reach this issue.',
                  '',
                  'Close this issue only if ZAP reporting itself is being',
                  'redesigned — otherwise keep it open as the canonical thread.',
                ].join('\n'),
              });
              issue = created.data;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 7);

            const formatGroup = (label, list) => {
              if (list.length === 0) return `- **${label}**: 0`;
              const names = [...new Set(list.map(a => `${a.name} [${a.pluginid}]`))];
              return `- **${label}**: ${list.length} (${names.slice(0, 5).join('; ')}${names.length > 5 ? ', …' : ''})`;
            };

            const commentBody = [
              `### Run ${shortSha} — ${new Date().toISOString()}`,
              '',
              formatGroup('High', high),
              formatGroup('Medium', medium),
              formatGroup('Low', low),
              formatGroup('Informational', informational),
              '',
              `[View full report](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: commentBody,
            });

            // If high findings exist, escalate with a separate labelled issue
            // (kept from prior behavior — one issue per high-severity batch).
            if (high.length > 0 && github.event_name === 'push') {
              let body = '## 🚨 High Severity Security Vulnerabilities Detected\n\n';
              body += `OWASP ZAP scan found **${high.length} high severity issues**:\n\n`;
              high.forEach((alert, i) => {
                body += `### ${i + 1}. ${alert.name}\n`;
                body += `- **Risk**: ${alert.riskdesc}\n`;
                body += `- **Confidence**: ${alert.confidence}\n`;
                body += `- **Description**: ${alert.desc}\n`;
                body += `- **Solution**: ${alert.solution}\n`;
                body += `- **Reference**: ${alert.reference}\n\n`;
              });
              body += `\n---\nScan triggered by: ${shortSha}\nBranch: ${context.ref}\nTracking: #${issue.number}\n`;

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Security: ${high.length} High Severity Vulnerabilities (${shortSha})`,
                body: body,
                labels: ['security', 'high-priority', 'zap-scan'],
              });
            }

      - name: Stop API server
        if: always()
        working-directory: backend
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Upload to GitHub Security
        # Only upload if the SARIF report actually got produced. Without
        # this guard the step fails with "Path does not exist:
        # report_sarif.sarif" whenever a scan fails before producing output.
        if: always() && hashFiles('report_sarif.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: report_sarif.sarif
          category: zap-scan
